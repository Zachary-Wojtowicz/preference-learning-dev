<!DOCTYPE html>
<html lang="en">
<head>

<title>Preference Elicitation Experiment</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  .container{max-width:860px;margin:0 auto}

  .btn{background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:.6rem 2rem;font-size:.95rem;cursor:pointer;transition:background .15s}
  .btn:disabled{background:#a0a0a0;cursor:not-allowed}.btn:not(:disabled):hover{background:#2563eb}
  .btn-secondary{background:#6b7280;color:#fff;border:none;border-radius:6px;padding:.5rem 1.5rem;font-size:.85rem;cursor:pointer}.btn-secondary:hover{background:#4b5563}
  .results h1{text-align:center;font-size:1.4rem;font-weight:600;margin-bottom:1rem}
  .results pre{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:1.25rem;overflow-x:auto;font-size:.78rem;line-height:1.6;max-height:60vh}
  .results .copy-row{text-align:center;margin-top:1rem}.results .stats{margin-bottom:1.5rem;text-align:center;font-size:.9rem;color:#555}
  .error-msg{text-align:center;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:2rem;color:#b91c1c}
  .loading{text-align:center;padding:3rem;color:#888;font-size:.95rem}
  .dim-card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:1.25rem;margin-bottom:1rem}
  .dim-card-tag{display:inline-block;font-size:.72rem;font-weight:600;color:#3b82f6;text-transform:uppercase;letter-spacing:.06em;background:#eff6ff;border-radius:4px;padding:.15rem .5rem;margin-bottom:.5rem}
  .dim-card-name{font-size:1.15rem;font-weight:600;margin-bottom:.6rem}
  .dim-card-row{font-size:.88rem;color:#444;margin-bottom:.35rem}.dim-card-row strong{color:#222;font-weight:600}
  .dim-card-guidance{font-size:.85rem;color:#555;margin-top:.6rem;padding-top:.6rem;border-top:1px solid #f0f0f0;line-height:1.5}
  .option-card.train-correct{border-color:#10b981;box-shadow:0 0 0 2px #10b981}
  .option-card.train-incorrect{border-color:#ef4444;box-shadow:0 0 0 2px #ef4444}
  .option-card.disabled-train{pointer-events:none}
  .train-feedback{font-size:1rem;font-weight:500;margin:1rem 0;padding:.75rem 1rem;border-radius:6px;text-align:center}
  .train-feedback.fb-correct{background:#d1fae5;color:#065f46}
  .train-feedback.fb-incorrect{background:#fee2e2;color:#991b1b}
  .eval-intro{max-width:680px;margin:0 auto 1.25rem;text-align:center}
  .eval-intro h1{font-size:1.3rem;font-weight:600;margin-bottom:.6rem}
  .eval-intro p{font-size:.92rem;color:#444;margin-bottom:.5rem}
  .eval-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
  .eval-col{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:1.1rem 1.25rem}
  .eval-col-header{font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#3b82f6;margin-bottom:.6rem;text-align:center;background:#eff6ff;border-radius:5px;padding:.3rem .5rem}
  .eval-list{list-style:none;padding:0;margin:0}
  .eval-list li{font-size:.92rem;padding:.45rem 0;border-bottom:1px solid #f0f0f0;line-height:1.4}
  .eval-list li:last-child{border-bottom:none}
  .eval-list .cat-word{color:#3b82f6;font-weight:600}
  .eval-section-label{font-size:.72rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#666;margin:.4rem 0 .55rem;padding-bottom:.25rem;border-bottom:1px solid #eee}
  .eval-section-label.bottom{margin-top:1rem}
  .eval-bars{list-style:none;padding:0;margin:0}
  .eval-bars li{display:grid;grid-template-columns:minmax(0,1fr) 140px;gap:.6rem;align-items:center;padding:.32rem 0;font-size:.86rem}
  .eval-bars .dim-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#222}
  .eval-bars .bar-track{height:10px;background:#f1f3f5;border-radius:5px;position:relative}
  .eval-bars .bar-track::before{content:'';position:absolute;left:50%;top:-1px;bottom:-1px;width:1px;background:#cbd5e1;transform:translateX(-50%);z-index:1}
  .eval-bars .bar-fill{position:absolute;height:100%;top:0;transition:width .3s ease}
  .eval-bars .bar-fill.pos{left:50%;background:linear-gradient(90deg,#93c5fd,#1d4ed8);border-radius:0 5px 5px 0}
  .eval-bars .bar-fill.neg{right:50%;background:linear-gradient(270deg,#fca5a5,#b91c1c);border-radius:5px 0 0 5px}
  .likert-prompt{text-align:center;font-size:1rem;font-weight:500;margin-bottom:.85rem;color:#333}
  .likert-row{display:grid;grid-template-columns:repeat(6,1fr);gap:.4rem;max-width:720px;margin:0 auto 1rem}
  .likert-btn{padding:.65rem .35rem;font-size:.78rem;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#333;cursor:pointer;transition:all .15s;text-align:center;line-height:1.25}
  .likert-btn:hover{border-color:#888;background:#f9fafb}
  .likert-btn.selected{background:#3b82f6;color:#fff;border-color:#3b82f6}
  .likert-row .arrow{font-weight:600;font-size:.85rem;display:block;margin-bottom:.15rem}
  @media(max-width:700px){.eval-grid{grid-template-columns:1fr}.likert-row{grid-template-columns:repeat(3,1fr)}.likert-btn{font-size:.72rem;padding:.55rem .25rem}}
  @media(max-width:600px){.options{flex-direction:column}.slider-row{grid-template-columns:120px 1fr 36px}}
</style>

<body>
<div class="container" id="app"><div class="loading">Loading…</div></div>
<script>
(function(){
if(window.parent!==window){
  // Embedded mode: blend into parent (Qualtrics) bg and resize iframe to content.
  var setEmbedStyle=function(){
    document.documentElement.style.background='transparent';
    if(document.body){document.body.style.background='transparent';document.body.style.padding='1rem';}
  };
  setEmbedStyle();
  document.addEventListener('DOMContentLoaded',setEmbedStyle);
  var lastH=0;
  window.__sendExperimentSize=function(){
    var h=Math.max(document.documentElement.scrollHeight,document.body?document.body.scrollHeight:0);
    if(h&&h!==lastH){lastH=h;try{window.parent.postMessage({type:'experiment_resize',height:h},'*');}catch(e){}}
  };
  var schedule=function(){requestAnimationFrame(window.__sendExperimentSize);};
  window.addEventListener('load',schedule);
  window.addEventListener('resize',schedule);
  if(window.ResizeObserver){
    var ro=new ResizeObserver(schedule);
    if(document.body)ro.observe(document.body);
    else document.addEventListener('DOMContentLoaded',function(){ro.observe(document.body);});
  }
  // Tell the parent to scroll its window so the iframe top is in view (called on screen change).
  window.__scrollParentToTop=function(){
    try{window.parent.postMessage({type:'experiment_scroll_top'},'*');}catch(e){}
  };
}else{
  window.__scrollParentToTop=function(){};
}
var app=document.getElementById('app');
var trials=[],experimentConfig=null,gramMatrix=null,condition=null,conditionKey='',participantId='',domainKey='';
var assignedTrialIndices=[],currentStep=0,responses=[],chosen=null,startTime=null,firstChoiceTime=null,topKSliders=5,visibleSliderIndices=[],postUrl=null;
var trainingPlan=[],trainingStep=0,inTraining=false,trainingResponses=[],numFeedback=20,numTraining=5;
var dimQuantiles=null;  // {dimension_id -> [b1, b2, ..., b_{n-1}]} per-dim quantile boundaries
var deltaGram=null,deltaGramN=0,trialProjections=null,evalState=null;
var HIDDEN_FIELDS=new Set(['title','_rendered_text','movie_id','wine_id','action_id','completion_id','option_id','id','row_id','text','prompt_hash','category','embedding','rating_count','taster_twitter_handle','points','price','taster_name','dilemma_id','topic_group','situation','values','consequence']);
var FIELD_LABELS={plot_summary:'Plot',genres:'Genres',director:'Director',stars:'Stars',variety:'Variety',country:'Country',province:'Province',points:'Rating',price:'Price',description:'Description',user_prompt:'Question',assistant_response:'Response',winery:'Winery',designation:'Designation',region_1:'Region',taster_name:'Reviewer'};
var DEFAULT_CATEGORIES=[
  {key:'skip',phrase:'prefer to skip',label:'Prefer to skip',mult:-1.5},
  {key:'not_into',phrase:"aren\u2019t into",label:"Aren\u2019t into",mult:-1.0},
  {key:'indifferent',phrase:'are indifferent to',label:'Indifferent',mult:0.0},
  {key:'like',phrase:'like',label:'Like',mult:1.0},
  {key:'love',phrase:'love',label:'Love',mult:1.5}
];
var CATEGORIES=DEFAULT_CATEGORIES;
function loadCategories(){
  if(experimentConfig&&experimentConfig.inference_categories&&experimentConfig.inference_categories.length>0)
    CATEGORIES=experimentConfig.inference_categories;
  else CATEGORIES=DEFAULT_CATEGORIES;
}
// Compute quantile boundaries for category assignment from the symmetric
// distribution {value_if_a, value_if_b} over the trial pool. With n CATEGORIES
// we return n-1 boundaries; effective values below boundary[i] get CATEGORIES[i],
// values above all boundaries get the last category. Symmetric construction
// guarantees q_i = -q_{n-1-i}, so v=0 always lands in the middle bucket.
//
// Two modes (set via experimentConfig.categorization):
//   "perdim" (default) — one set of boundaries per dimension. Each dim's
//      category masses are 20% each by construction.
//   "pooled" — one shared set of boundaries computed from ALL (p,k) values.
//      Categories have the same yardstick across dims; per-dim mass varies.
//
// Both modes return {dimension_id -> boundaries} so the lookup in catFromEff
// is identical; "pooled" just stores the same array under every dim_id.
function computeDimQuantiles(){
  if(!trials||trials.length===0)return null;
  var nCats=CATEGORIES.length;
  if(nCats<2)return null;
  var mode=(experimentConfig&&experimentConfig.categorization)||'perdim';
  function quantilesOf(arr){
    if(arr.length<nCats)return null;
    arr.sort(function(a,b){return a-b;});
    var q=function(p){var i=Math.floor(p*(arr.length-1));return arr[i];};
    var qs=[];for(var i=1;i<nCats;i++)qs.push(q(i/nCats));
    return (qs[0]===qs[qs.length-1])?null:qs;
  }
  var byDim={},dimIds=[];
  trials.forEach(function(t){
    if(!t.sliders)return;
    t.sliders.forEach(function(s){
      var did=s.dimension_id;if(did==null)return;
      if(!byDim[did]){byDim[did]=[];dimIds.push(did);}
      var va=Number(s.value_if_a),vb=Number(s.value_if_b);
      if(Number.isFinite(va))byDim[did].push(va);
      if(Number.isFinite(vb))byDim[did].push(vb);
    });
  });
  if(mode==='pooled'){
    var pooled=[];dimIds.forEach(function(d){pooled.push.apply(pooled,byDim[d]);});
    var qs=quantilesOf(pooled.slice());
    var out={};dimIds.forEach(function(d){out[d]=qs;});
    return out;
  }
  // perdim (default)
  var out={};
  dimIds.forEach(function(did){out[did]=quantilesOf(byDim[did].slice());});
  return out;
}
function catFromEff(v,dimensionId){
  // Per-dim quantile assignment when boundaries available.
  if(dimQuantiles&&dimensionId!=null&&dimQuantiles[dimensionId]){
    var qs=dimQuantiles[dimensionId];
    for(var i=0;i<qs.length;i++)if(v<qs[i])return CATEGORIES[i].key;
    return CATEGORIES[CATEGORIES.length-1].key;
  }
  // Fallback: fixed multiplier-based assignment (used for movies/wines until
  // their pools are loaded, or when a dim's distribution is degenerate).
  var maxM=Math.max.apply(null,CATEGORIES.map(function(c){return Math.abs(c.mult)}))||1;
  var target=(v/100)*maxM,best=CATEGORIES[Math.floor(CATEGORIES.length/2)].key,bestD=Infinity;
  CATEGORIES.forEach(function(c){var d=Math.abs(c.mult-target);if(d<bestD){bestD=d;best=c.key;}});
  return best;
}
function catPhrase(k){var c=CATEGORIES.find(function(x){return x.key===k});return c?c.phrase:k;}
function catMult(k){var c=CATEGORIES.find(function(x){return x.key===k});return c?c.mult:0;}
function infMode(){return condition?condition.show_inferences:false;}
// Fields that, when identical on both options of a pair, should render once above
// the cards as shared context (e.g., a dilemma's situation) rather than twice.
var LIFTABLE_FIELDS=['situation'];
function liftSharedFields(trial){
  if(!trial||!trial.option_a||!trial.option_b)return;
  var fa=trial.option_a.fields||{},fb=trial.option_b.fields||{};
  LIFTABLE_FIELDS.forEach(function(k){
    if(trial[k]!=null)return;
    var va=fa[k],vb=fb[k];
    if(va==null||vb==null)return;
    if(String(va)!==String(vb))return;
    trial[k]=va;delete fa[k];delete fb[k];
  });
}
// Optional sidecar: outputs/<domain>/polished_labels.json provides cleaner names
// for dimension labels. Apply in place to experimentConfig.dimensions and to each
// trial's sliders so render code sees only the polished values. Original raw
// labels remain in upstream files; deleting polished_labels.json reverts.
function applyPolishedLabels(polished){
  if(!polished||!polished.dimensions)return;
  var p=polished.dimensions;
  if(experimentConfig&&Array.isArray(experimentConfig.dimensions)){
    experimentConfig.dimensions.forEach(function(d){
      var pp=p[String(d.dimension_id)];if(!pp)return;
      if(pp.name)d.name=pp.name;
      if(pp.low_label)d.low_label=pp.low_label;
      if(pp.high_label)d.high_label=pp.high_label;
    });
  }
  trials.forEach(function(t){
    (t.sliders||[]).forEach(function(s){
      var pp=p[String(s.dimension_id)];if(!pp)return;
      if(pp.name)s.label=pp.name;
      if(pp.low_label)s.low_label=pp.low_label;
      if(pp.high_label)s.high_label=pp.high_label;
    });
  });
}
function getUrlParams(){var p=new URLSearchParams(window.location.search);var mRaw=p.get('m');return{pid:p.get('pid')||'',condition:p.get('condition')||'',n:parseInt(p.get('n'),10)||0,m:(mRaw==null||mRaw==='')?null:parseInt(mRaw,10),domain:p.get('domain')||'',post:p.get('post')||''};}
var urlParams=getUrlParams();domainKey=urlParams.domain||'movies_100';postUrl=urlParams.post||null;
var basePath=domainKey?'outputs/'+domainKey+'/':'';
Promise.all([
  fetch(basePath+'trials.json').then(function(r){if(!r.ok)throw new Error();return r.json()}),
  fetch(basePath+'experiment_config.json').then(function(r){if(!r.ok)throw null;return r.json()}).catch(function(){return null}),
  fetch(basePath+'trial_projections.json').then(function(r){if(!r.ok)throw null;return r.json()}).catch(function(){return null}),
  fetch(basePath+'delta_gram.bin').then(function(r){if(!r.ok)throw null;return r.arrayBuffer()}).catch(function(){return null}),
  fetch(basePath+'polished_labels.json').then(function(r){if(!r.ok)throw null;return r.json()}).catch(function(){return null})
]).then(function(arr){
  trials=arr[0];experimentConfig=arr[1];trialProjections=arr[2];
  if(arr[3]){deltaGram=new Float32Array(arr[3]);deltaGramN=Math.round(Math.sqrt(deltaGram.length));}
  trials.forEach(liftSharedFields);
  applyPolishedLabels(arr[4]);
  if(arr[1]&&arr[1].gram_matrix)gramMatrix=arr[1].gram_matrix;
  if(arr[1]&&arr[1].top_k_sliders)topKSliders=arr[1].top_k_sliders;
  loadCategories();
  dimQuantiles=computeDimQuantiles();
  if(urlParams.pid&&urlParams.condition){
    participantId=urlParams.pid;conditionKey=urlParams.condition;
    var cm=arr[1]?arr[1].conditions:buildFC();condition=cm[conditionKey];
    if(!condition){app.innerHTML='<div class="error-msg">Unknown condition: '+esc(conditionKey)+'</div>';return;}
    numFeedback=urlParams.n||(arr[1]&&arr[1].num_trials_per_participant)||20;
    numTraining=(urlParams.m!=null&&Number.isFinite(urlParams.m))?urlParams.m:((arr[1]&&arr[1].num_training_trials!=null)?arr[1].num_training_trials:5);
    startExperiment();
  }else renderSetup();
}).catch(function(){app.innerHTML='<div class="error-msg">Could not load trials.json.<br><code>cd web-interface && python3 -m http.server 8080</code></div>';});
var KNOWN_DOMAINS=[{key:'movies_100',label:'Movies (100)'},{key:'movies_50',label:'Movies (50)'},{key:'scruples_dilemmas',label:'Scruples Dilemmas'},{key:'dailydilemmas',label:'Daily Dilemmas'},{key:'wines_100',label:'Wines (100)'}];
function buildFC(){return{
  choice_only:{label:'Choice Only',show_sliders:false,sliders_adjustable:false,show_checkboxes:false,show_inferences:false},
  choice_readonly_sliders:{label:'Choice + Read-Only Sliders',show_sliders:true,sliders_adjustable:false,show_checkboxes:false,show_inferences:false},
  choice_adjustable_sliders:{label:'Choice + Adjustable Sliders',show_sliders:true,sliders_adjustable:true,show_checkboxes:false,show_inferences:false},

function buildTrainingPlan(M){
  if(M<=0||!experimentConfig||!Array.isArray(experimentConfig.dimensions)||trials.length===0)return[];
  var dims=experimentConfig.dimensions.slice(0,M);
  var used={};var plan=[];
  dims.forEach(function(dim){
    var bestT=-1,bestS=-1;
    for(var ti=0;ti<trials.length;ti++){
      if(used[ti])continue;var t=trials[ti];if(!t.sliders)continue;
      var s=null;for(var k=0;k<t.sliders.length;k++){if(t.sliders[k].dimension_id===dim.dimension_id){s=t.sliders[k];break;}}
      if(!s)continue;
      var sp=Math.abs((s.value_if_a||0)-(s.value_if_b||0));
      if(sp>bestS){bestS=sp;bestT=ti;}
    }
    if(bestT>=0){plan.push({trialIdx:bestT,dimension:dim});used[bestT]=true;}
  });
  return plan;
}

function handleSliderChange(e,trial,key){

  var ov=key==='a'?trial.sliders[cIdx].value_if_a:trial.sliders[cIdx].value_if_b;
  var d=app.querySelector('.slider-value[data-for="'+ci.dataset.id+'"]');if(d)d.textContent=nv;
  if(!gramMatrix)return;var delta=nv-ov;if(Math.abs(delta)<1)return;
  document.getElementById('sliderContainer').querySelectorAll('input[type="range"]').forEach(function(o){
    var oIdx=parseInt(o.dataset.sliderIndex,10);if(oIdx===cIdx)return;
    var corr=gramMatrix[oIdx][cIdx];if(Math.abs(corr)<0.05)return;

  var s=JSON.stringify(output,null,2),avg=Math.round(responses.reduce(function(a,r){return a+(r.response_time_ms||0)},0)/responses.length/1000*10)/10;
  var h='<div class="results"><h1>Thank You!</h1><div class="stats">'+responses.length+' trials \u00b7 avg '+avg+'s per trial</div>';
  h+='<pre><code>'+esc(s)+'</code></pre>';
  h+='<div class="copy-row"><button class="btn" id="copyBtn">Copy to Clipboard</button> <button class="btn-secondary" id="downloadBtn">Download JSON</button></div></div>';
  app.innerHTML=h;
  document.getElementById('copyBtn').addEventListener('click',function(){navigator.clipboard.writeText(s).then(function(){var b=document.getElementById('copyBtn');b.textContent='Copied!';setTimeout(function(){b.textContent='Copy to Clipboard'},1500)})});
  document.getElementById('downloadBtn').addEventListener('click',function(){var blob=new Blob([s],{type:'application/json'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='responses_'+participantId+'_'+conditionKey+'.json';a.click();URL.revokeObjectURL(u);});
}
// ===== Newton+L2 fitters for post-experiment evaluation =====
function _matVec(M,v){var n=M.length,r=new Array(n);for(var i=0;i<n;i++){var row=M[i],s=0;for(var j=0;j<v.length;j++)s+=row[j]*v[j];r[i]=s;}return r;}
function _solveLinear(A,b){
  var n=b.length,M=[],rhs=b.slice();
  for(var i=0;i<n;i++)M.push(A[i].slice());
  for(var k=0;k<n;k++){
    var maxR=k,maxV=Math.abs(M[k][k]);
    for(var i=k+1;i<n;i++)if(Math.abs(M[i][k])>maxV){maxV=Math.abs(M[i][k]);maxR=i;}
    if(maxR!==k){var tmp=M[k];M[k]=M[maxR];M[maxR]=tmp;var t=rhs[k];rhs[k]=rhs[maxR];rhs[maxR]=t;}
    if(Math.abs(M[k][k])<1e-12)return null;
    for(var i2=k+1;i2<n;i2++){var f=M[i2][k]/M[k][k];for(var j=k;j<n;j++)M[i2][j]-=f*M[k][j];rhs[i2]-=f*rhs[k];}
  }
  var x=new Array(n);
  for(var i=n-1;i>=0;i--){var s=rhs[i];for(var j=i+1;j<n;j++)s-=M[i][j]*x[j];x[i]=s/M[i][i];}
  return x;
}
function _sigm(x){if(x>20)return 1-1e-9;if(x<-20)return 1e-9;return 1/(1+Math.exp(-x));}
// Standard fit: kernel logistic regression. Returns alpha s.t. theta = sum_t alpha_t * delta_t.
function fitNewtonStandard(D,y,lam,maxIter){
  var T=D.length,alpha=new Array(T).fill(0);
  for(var iter=0;iter<(maxIter||12);iter++){
    var u=_matVec(D,alpha);
    var p=u.map(_sigm),w=p.map(function(pi){return pi*(1-pi);});
    var rhs=new Array(T);for(var i=0;i<T;i++)rhs[i]=-(p[i]-y[i]+lam*alpha[i]);
    var A=[];for(var i2=0;i2<T;i2++){var row=new Array(T);for(var j=0;j<T;j++)row[j]=w[i2]*D[i2][j]+(i2===j?lam:0);A.push(row);}
    var dA=_solveLinear(A,rhs);if(!dA)break;
    var step=0;for(var i3=0;i3<T;i3++){alpha[i3]+=dA[i3];if(Math.abs(dA[i3])>step)step=Math.abs(dA[i3]);}
    if(step<1e-7)break;
  }
  return alpha;
}
// Partial fit: K-dim primal logistic with G-shaped prior centered at beta_0.
function fitNewtonPartial(U,y,G,beta0,lam,maxIter){
  var T=U.length,K=U[0].length,beta=beta0.slice();
  for(var iter=0;iter<(maxIter||12);iter++){
    var u=new Array(T);for(var t=0;t<T;t++){var s=0;for(var k=0;k<K;k++)s+=U[t][k]*beta[k];u[t]=s;}
    var p=u.map(_sigm),w=p.map(function(pi){return pi*(1-pi);});
    var diff=new Array(K);for(var k2=0;k2<K;k2++)diff[k2]=beta[k2]-beta0[k2];
    var Gd=_matVec(G,diff);
    var grad=new Array(K).fill(0);
    for(var k=0;k<K;k++){var s2=0;for(var t2=0;t2<T;t2++)s2+=U[t2][k]*(p[t2]-y[t2]);grad[k]=s2+lam*Gd[k];}
    var H=[];for(var k=0;k<K;k++){var row=new Array(K).fill(0);for(var k3=0;k3<K;k3++){var s3=0;for(var t3=0;t3<T;t3++)s3+=U[t3][k]*w[t3]*U[t3][k3];row[k3]=s3+lam*G[k][k3];}H.push(row);}
    var rhs=grad.map(function(g){return -g;});
    var dB=_solveLinear(H,rhs);if(!dB)break;
    var step=0;for(var k4=0;k4<K;k4++){beta[k4]+=dB[k4];if(Math.abs(dB[k4])>step)step=Math.abs(dB[k4]);}
    if(step<1e-7)break;
  }
  return beta;
}
function scoresFromAlpha(alpha,Vd){var T=Vd.length,K=Vd[0].length,s=new Array(K).fill(0);for(var k=0;k<K;k++){var v=0;for(var t=0;t<T;t++)v+=alpha[t]*Vd[t][k];s[k]=v;}return s;}
function scoresFromBeta(beta,G){return _matVec(G,beta);}

// Build participant-trial-indexed data structures from responses.
function buildEvalInputs(){
  if(!trialProjections||!Array.isArray(trialProjections))return null;
  if(!experimentConfig||!Array.isArray(experimentConfig.dimensions))return null;
  var T=responses.length;if(T===0)return null;
  var dims=experimentConfig.dimensions,K=dims.length;
  var dimIds=dims.map(function(d){return d.id||('dim_'+d.dimension_id);});
  // Build U (T x K) from raw_projection of each chosen trial
  var U=[],y=[],poolIdx=[];
  for(var i=0;i<T;i++){
    var pi=assignedTrialIndices[i];poolIdx.push(pi);
    var tp=trialProjections[pi];
    if(!tp||!Array.isArray(tp.raw_projection))return null;
    U.push(tp.raw_projection.slice());
    y.push(responses[i].chosen==='a'?1:0);
  }
  // Build D sub-matrix (T x T). delta_gram.bin is keyed on trials.json indices.
  var D=null;
  if(deltaGram&&deltaGramN===trials.length){
    D=[];for(var ii=0;ii<T;ii++){var row=new Array(T);var pi_i=poolIdx[ii];for(var jj=0;jj<T;jj++){var pi_j=poolIdx[jj];row[jj]=deltaGram[pi_i*deltaGramN+pi_j];}D.push(row);}
  }
  // Per-trial multipliers (only for inference conditions). Sums + counts per dim across visible-trials.
  var sums=new Array(K).fill(0),counts=new Array(K).fill(0);
  responses.forEach(function(r){
    if(!r.inference_values)return;
    Object.keys(r.inference_values).forEach(function(did){
      var idx=dimIds.indexOf(did);if(idx<0)return;
      var m=r.inference_values[did].multiplier;
      if(typeof m!=='number'||!isFinite(m))return;
      sums[idx]+=m;counts[idx]+=1;
    });
  });
  var hasMultipliers=counts.some(function(c){return c>0;});
  var mean=new Array(K).fill(0);for(var k=0;k<K;k++)mean[k]=counts[k]>0?sums[k]/counts[k]:0;
  return {U:U,y:y,D:D,K:K,T:T,dims:dims,dimIds:dimIds,mean:mean,hasMultipliers:hasMultipliers};
}

// Top-N most-positive and N most-negative dimensions for the bar-chart variant.
function buildTopBottom(scores,dims,nEach){
  var arr=scores.map(function(s,i){return{i:i,s:s,name:dims[i].name||dims[i].label||('Dimension '+(i+1)),id:dims[i].id||('dim_'+dims[i].dimension_id)};}).sort(function(a,b){return b.s-a.s;});
  var most=arr.slice(0,nEach);
  // Tail of arr is the most-negative end, sorted descending — natural reading order
  // (smallest negative magnitude first, largest negative magnitude last) is just the slice.
  var least=arr.slice(-nEach);
  return {most:most,least:least};
}
// Map signed scores to top-N inferences with quintile categories within those N.
function buildInferences(scores,dims,nShow){
  var idxs=scores.map(function(s,i){return{i:i,abs:Math.abs(s),s:s};}).sort(function(a,b){return b.abs-a.abs;}).slice(0,nShow);
  // Order by signed score (most positive first) to assign quintile categories
  var ordered=idxs.slice().sort(function(a,b){return b.s-a.s;});
  var nCats=CATEGORIES.length,n=ordered.length;
  // Bin into quintiles by signed rank: most positive -> CATEGORIES[nCats-1] ('love'); most negative -> CATEGORIES[0] ('skip')
  var perBin=Math.ceil(n/nCats);
  var dimToCat={};
  ordered.forEach(function(item,rank){
    var binFromTop=Math.floor(rank/perBin);
    var catIdx=nCats-1-Math.min(binFromTop,nCats-1);
    dimToCat[item.i]=CATEGORIES[catIdx].key;
  });
  // Final list in signed-score order (top to bottom: love -> skip)
  return ordered.map(function(item){
    var d=dims[item.i],catKey=dimToCat[item.i];
    var cat=CATEGORIES.find(function(c){return c.key===catKey;})||CATEGORIES[Math.floor(nCats/2)];
    return {
      dim_id: d.id||('dim_'+d.dimension_id),
      dim_name: d.name||d.label||('Dimension '+(item.i+1)),
      category: cat.key,
      category_label: cat.label,
      phrase: cat.phrase,
      score: item.s,
    };
  });
}

function startEvaluation(){
  var comp=experimentConfig&&experimentConfig.comparison;
  var allowed=comp&&Array.isArray(comp.show_for_conditions)?comp.show_for_conditions:null;
  if(allowed&&allowed.indexOf(conditionKey)<0){evalState={skipped:'condition_excluded'};finishExperiment();return;}
  var inputs=buildEvalInputs();
  if(!inputs){evalState={skipped:'no_eval_data'};finishExperiment();return;}
  if(!inputs.D){evalState={skipped:'missing_delta_gram'};finishExperiment();return;}
  if(!gramMatrix){evalState={skipped:'missing_gram_matrix'};finishExperiment();return;}
  var lamS=(comp&&comp.lambda_standard)||10.0;
  var lamP=(comp&&comp.lambda_partial)||1.0;
  var nShow=(comp&&comp.n_dimensions_shown)||10;
  var format=(comp&&comp.eval_format)||'inference_list';
  // Standard fit (kernel logistic regression in dual form)
  var t0=performance.now();
  var alpha=fitNewtonStandard(inputs.D,inputs.y,lamS,15);
  var scoresStd=scoresFromAlpha(alpha,inputs.U);
  // Partial fit prior: solve G*beta_0 = mean
  var beta0=null;
  if(inputs.hasMultipliers){
    var sol=_solveLinear(gramMatrix,inputs.mean);
    beta0=sol||new Array(inputs.K).fill(0);
  }else{
    beta0=new Array(inputs.K).fill(0);
  }
  var beta=fitNewtonPartial(inputs.U,inputs.y,gramMatrix,beta0,lamP,15);
  var scoresPart=scoresFromBeta(beta,gramMatrix);
  var fitMs=Math.round(performance.now()-t0);
  // Build presentation payload depending on format
  var leftPayload,rightPayload;
  var stdOnLeft=(hashStr(participantId)%2)===0;
  if(format==='top_bottom_bars'){
    var nEach=(comp&&comp.n_per_side)||5;
    nEach=Math.min(nEach,Math.floor(inputs.K/2));
    var tbStd=buildTopBottom(scoresStd,inputs.dims,nEach);
    var tbPart=buildTopBottom(scoresPart,inputs.dims,nEach);
    leftPayload=stdOnLeft?tbStd:tbPart;
    rightPayload=stdOnLeft?tbPart:tbStd;
  }else{
    var nCap=Math.min(nShow,inputs.K);
    var infsStd=buildInferences(scoresStd,inputs.dims,nCap);
    var infsPart=buildInferences(scoresPart,inputs.dims,nCap);
    leftPayload=stdOnLeft?infsStd:infsPart;
    rightPayload=stdOnLeft?infsPart:infsStd;
  }
  evalState={
    eval_format: format,
    fit_duration_ms: fitMs,
    lambda_standard: lamS,
    lambda_partial: lamP,
    n_dimensions_shown: format==='top_bottom_bars'?(2*((comp&&comp.n_per_side)||5)):Math.min(nShow,inputs.K),
    has_multipliers: inputs.hasMultipliers,
    left_model: stdOnLeft?'standard':'partial',
    right_model: stdOnLeft?'partial':'standard',
    left_payload:  leftPayload,
    right_payload: rightPayload,
    rating: null,
    rating_numeric: null,
    response_time_ms: null,
    started_at: Date.now(),
  };
  renderEvaluation();
}

var LIKERT_LEVELS=[
  {key:'A_much_better',     label:'is much better',     side:'A', value:-3},
  {key:'A_better',          label:'is better',          side:'A', value:-2},
  {key:'A_slightly_better', label:'is slightly better', side:'A', value:-1},
  {key:'B_slightly_better', label:'is slightly better', side:'B', value: 1},
  {key:'B_better',          label:'is better',          side:'B', value: 2},
  {key:'B_much_better',     label:'is much better',     side:'B', value: 3},
];

function renderInferenceList(infs){
  var h='<ul class="eval-list">';
  infs.forEach(function(inf){
    h+='<li>You <span class="cat-word">'+esc(inf.phrase)+'</span> '+esc(inf.dim_name)+'.</li>';
  });
  h+='</ul>';
  return h;
}

function renderTopBottomBars(tb,labels){
  var maxAbs=0;
  tb.most.concat(tb.least).forEach(function(d){if(Math.abs(d.s)>maxAbs)maxAbs=Math.abs(d.s);});
  if(maxAbs<=0)maxAbs=1e-9;
  function row(d,kind){
    // Diverging bar: each side fills up to 50% of the track from the midpoint outward.
    var pct=Math.max(1.5,Math.round(Math.abs(d.s)/maxAbs*50*10)/10);
    return '<li><span class="dim-name">'+esc(d.name)+'</span><div class="bar-track"><div class="bar-fill '+kind+'" style="width:'+pct+'%"></div></div></li>';
  }
  var h='';
  h+='<div class="eval-section-label">'+esc(labels.most)+'</div><ul class="eval-bars">';
  tb.most.forEach(function(d){h+=row(d,'pos');});
  h+='</ul>';
  h+='<div class="eval-section-label bottom">'+esc(labels.least)+'</div><ul class="eval-bars">';
  tb.least.forEach(function(d){h+=row(d,'neg');});
  h+='</ul>';
  return h;
}

function renderEvaluation(){
  var st=evalState,comp=(experimentConfig&&experimentConfig.comparison)||{};
  var labels={
    most: comp.most_valued_label||'Most valued',
    least: comp.least_valued_label||'Least valued',
  };
  var h='<div class="eval-intro"><h1>Compare these two summaries</h1>';
  h+='<p>Below are two summaries of what we learned about your preferences from your choices.</p>';
  h+='<p>Read both, then tell us which feels more accurate.</p></div>';
  h+='<div class="eval-grid">';
  function colHTML(label,payload){
    if(st.eval_format==='top_bottom_bars')return renderTopBottomBars(payload,labels);
    return renderInferenceList(payload);
  }
  h+='<div class="eval-col"><div class="eval-col-header">Summary A</div>'+colHTML('A',st.left_payload)+'</div>';
  h+='<div class="eval-col"><div class="eval-col-header">Summary B</div>'+colHTML('B',st.right_payload)+'</div>';
  h+='</div>';
  h+='<div class="likert-prompt">Which summary feels more accurate?</div>';
  h+='<div class="likert-row">';
  LIKERT_LEVELS.forEach(function(lv){
    var arrow=lv.side==='A'?'A':'B';
    h+='<button class="likert-btn" data-key="'+lv.key+'" data-value="'+lv.value+'"><span class="arrow">'+arrow+'</span>'+esc(lv.label)+'</button>';
  });
  h+='</div>';
  h+='<div class="submit-row"><button class="btn" id="evalSubmit" disabled>Submit</button></div>';
  app.innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});window.__scrollParentToTop&&window.__scrollParentToTop();
  var selected=null;
  app.querySelectorAll('.likert-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      app.querySelectorAll('.likert-btn').forEach(function(b){b.classList.remove('selected');});
      btn.classList.add('selected');
      selected={key:btn.dataset.key,value:parseInt(btn.dataset.value,10)};
      document.getElementById('evalSubmit').disabled=false;
    });
  });
  document.getElementById('evalSubmit').addEventListener('click',function(){
    if(!selected)return;
    evalState.rating=selected.key;
    evalState.rating_numeric=selected.value;
    evalState.response_time_ms=Date.now()-evalState.started_at;
    finishExperiment();
  });
}

function esc(s){if(s==null)return'';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function hashStr(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0}return Math.abs(h)}
function seedRandom(seed){var s=seed|0;return function(){s=(s+0x6D2B79F5)|0;var t=Math.imul(s^(s>>>15),1|s);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296}}
function shuffle(arr,rng){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a}
})();
</script>
