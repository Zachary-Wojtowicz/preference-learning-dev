<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preference Elicitation Experiment</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f4f5f7;
    color: #1a1a1a;
    line-height: 1.5;
    padding: 2rem 1rem;
  }

  .container { max-width: 860px; margin: 0 auto; }

  /* --- Setup screen --- */
  .setup { max-width: 480px; margin: 0 auto; }
  .setup h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 1.5rem; text-align: center; }

  .field-group { margin-bottom: 1.25rem; }
  .field-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.35rem; }
  .field-group select, .field-group input {
    width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 6px;
    font-size: 0.9rem; background: #fff;
  }
  .field-group .hint { font-size: 0.75rem; color: #888; margin-top: 0.25rem; }

  /* --- Instructions --- */
  .instructions { max-width: 600px; margin: 0 auto; }
  .instructions h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 1rem; text-align: center; }
  .instructions p { font-size: 0.92rem; margin-bottom: 0.75rem; color: #444; }
  .instructions .inst-highlight {
    background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 6px;
    padding: 0.75rem 1rem; margin: 1rem 0; font-size: 0.88rem;
  }

  /* --- Progress --- */
  .progress {
    text-align: center; font-size: 0.85rem; color: #666;
    margin-bottom: 0.5rem; letter-spacing: 0.03em;
  }
  .progress-bar-track {
    height: 4px; background: #e0e0e0; border-radius: 2px; margin-bottom: 1.5rem;
  }
  .progress-bar-fill {
    height: 100%; background: #3b82f6; border-radius: 2px; transition: width 0.3s;
  }

  .prompt {
    text-align: center; font-size: 1.05rem; font-weight: 500;
    margin-bottom: 1.25rem; color: #444;
  }

  /* --- Option cards --- */
  .options { display: flex; gap: 1rem; }

  .option-card {
    flex: 1; background: #fff; border: 2px solid #ddd; border-radius: 8px;
    padding: 1.25rem; cursor: pointer;
    transition: border-color 0.15s, opacity 0.15s, box-shadow 0.15s;
  }
  .option-card:hover { border-color: #999; }
  .option-card.selected { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
  .option-card.dimmed { opacity: 0.5; }

  .option-card .card-poster {
    width: 100%; max-height: 400px; object-fit: contain;
    border-radius: 4px; margin-bottom: 0.5rem;
  }

  .option-card .card-title {
    font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem;
  }
  .option-card .card-field {
    font-size: 0.82rem; color: #555; margin-bottom: 0.25rem;
  }
  .option-card .card-field strong { color: #333; font-weight: 500; }
  .option-card .card-text {
    font-size: 0.85rem; color: #444; margin-top: 0.5rem; line-height: 1.5;
  }

  /* --- Dimension panel --- */
  .dim-panel {
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s ease, margin-top 0.3s ease;
    margin-top: 0;
  }
  .dim-panel.visible { max-height: 2000px; margin-top: 1.5rem; }

  .dim-panel-inner {
    background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
    padding: 1.25rem;
  }
  .dim-panel-header {
    font-size: 0.85rem; font-weight: 500; color: #666; margin-bottom: 1rem;
    padding-bottom: 0.5rem; border-bottom: 1px solid #eee;
  }

  /* --- Slider rows --- */
  .slider-row {
    display: grid;
    grid-template-columns: 160px 1fr 40px;
    align-items: center; gap: 0.5rem;
    margin-bottom: 0.65rem;
  }
  .slider-row:last-of-type { margin-bottom: 0; }

  .slider-label {
    font-size: 0.82rem; font-weight: 500; text-align: right;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .slider-label .pole-labels {
    font-size: 0.7rem; color: #888; font-weight: 400;
    display: block; margin-top: 1px;
  }

  .slider-track { position: relative; }
  .slider-track input[type="range"] { width: 100%; accent-color: #3b82f6; }
  .slider-track input[type="range"]:disabled { accent-color: #999; }

  .slider-value {
    text-align: right; font-size: 0.82rem;
    font-variant-numeric: tabular-nums; color: #555;
  }

  /* --- Checkbox rows --- */
  .checkbox-row {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 0.5rem; padding: 0.5rem 0.5rem;
    border-radius: 6px; transition: background 0.15s;
  }
  .checkbox-row:hover { background: #f8f9fa; }
  .checkbox-row:last-of-type { margin-bottom: 0; }

  .checkbox-row input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: #3b82f6;
    flex-shrink: 0; cursor: pointer;
  }
  .checkbox-row .cb-label {
    font-size: 0.85rem; font-weight: 500; flex: 1; cursor: pointer;
  }
  .checkbox-row .cb-bar-container {
    width: 120px; height: 8px; background: #e5e7eb; border-radius: 4px;
    overflow: hidden; flex-shrink: 0;
  }
  .checkbox-row .cb-bar {
    height: 100%; border-radius: 4px; transition: width 0.2s;
  }
  .checkbox-row .cb-bar.positive { background: #3b82f6; }
  .checkbox-row .cb-bar.negative { background: #ef4444; float: right; }
  .checkbox-row .cb-value {
    width: 36px; text-align: right; font-size: 0.78rem;
    font-variant-numeric: tabular-nums; color: #888;
  }

  /* --- Inference rows --- */
  .inference-row {
    margin-bottom: 0.75rem; padding: 0.75rem;
    background: #fafbfc; border: 1px solid #e5e7eb;
    border-radius: 8px; transition: opacity 0.2s;
  }
  .inference-row.removed {
    opacity: 0.35;
    text-decoration: line-through;
    text-decoration-color: #999;
  }
  .inference-row:last-of-type { margin-bottom: 0; }

  .inference-text {
    font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem;
    color: #1a1a1a;
  }

  .inference-controls {
    display: flex; gap: 0.35rem; flex-wrap: wrap;
  }
  .inference-controls button {
    padding: 0.3rem 0.7rem; font-size: 0.78rem;
    border: 1px solid #d1d5db; border-radius: 5px;
    background: #fff; color: #555; cursor: pointer;
    transition: all 0.15s;
  }
  .inference-controls button:hover { border-color: #999; }
  .inference-controls button.active {
    background: #3b82f6; color: #fff; border-color: #3b82f6;
  }
  .inference-controls button.active-remove {
    background: #ef4444; color: #fff; border-color: #ef4444;
  }

  /* --- Buttons --- */
  .submit-row { text-align: center; margin-top: 1.5rem; }

  .btn {
    background: #3b82f6; color: #fff; border: none; border-radius: 6px;
    padding: 0.6rem 2rem; font-size: 0.95rem; cursor: pointer;
    transition: background 0.15s;
  }
  .btn:disabled { background: #a0a0a0; cursor: not-allowed; }
  .btn:not(:disabled):hover { background: #2563eb; }
  .btn-secondary {
    background: #6b7280; color: #fff; border: none; border-radius: 6px;
    padding: 0.5rem 1.5rem; font-size: 0.85rem; cursor: pointer;
  }
  .btn-secondary:hover { background: #4b5563; }

  /* --- Results --- */
  .results h1 {
    text-align: center; font-size: 1.4rem; font-weight: 600;
    margin-bottom: 1rem;
  }
  .results pre {
    background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
    padding: 1.25rem; overflow-x: auto; font-size: 0.78rem;
    line-height: 1.6; max-height: 60vh;
  }
  .results .copy-row { text-align: center; margin-top: 1rem; }
  .results .stats {
    margin-bottom: 1.5rem; text-align: center;
    font-size: 0.9rem; color: #555;
  }

  .error-msg {
    text-align: center; background: #fff; border: 1px solid #e0e0e0;
    border-radius: 8px; padding: 2rem; color: #b91c1c;
  }
  .error-msg code {
    display: block; margin-top: 0.75rem; color: #444; font-size: 0.85rem;
  }

  .loading {
    text-align: center; padding: 3rem; color: #888; font-size: 0.95rem;
  }

  @media (max-width: 600px) {
    .options { flex-direction: column; }
    .slider-row { grid-template-columns: 120px 1fr 36px; }
    .slider-label { font-size: 0.78rem; }
  }
</style>
</head>
<body>
<div class="container" id="app"><div class="loading">Loading experiment data…</div></div>

<script>
(function () {
  const app = document.getElementById('app');

  // ---------------------------------------------------------------
  // State
  // ---------------------------------------------------------------
  let trials = [];
  let experimentConfig = null;
  let gramMatrix = null;
  let condition = null;
  let conditionKey = '';
  let participantId = '';
  let domainKey = '';
  let assignedTrialIndices = [];
  let currentStep = 0;
  let responses = [];
  let chosen = null;
  let startTime = null;
  let topKSliders = 5;
  let visibleSliderIndices = [];
  let postUrl = null;        // optional POST endpoint for responses

  // Fields to hide from option cards (internal / unreadable)
  const HIDDEN_FIELDS = new Set([
    'title', '_rendered_text', 'movie_id', 'wine_id', 'action_id',
    'completion_id', 'option_id', 'id', 'row_id', 'text',
    'prompt_hash', 'category', 'embedding',
    'rating_count', 'taster_twitter_handle',
  ]);

  // Prettier labels for known field names
  const FIELD_LABELS = {
    plot_summary: 'Plot',
    genres: 'Genres',
    director: 'Director',
    stars: 'Stars',
    variety: 'Variety',
    country: 'Country',
    province: 'Province',
    points: 'Rating',
    price: 'Price',
    description: 'Description',
    user_prompt: 'Question',
    assistant_response: 'Response',
    winery: 'Winery',
    designation: 'Designation',
    region_1: 'Region',
    taster_name: 'Reviewer',
  };

  // ---------------------------------------------------------------
  // URL parameters
  // ---------------------------------------------------------------
  function getUrlParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      pid: params.get('pid') || '',
      condition: params.get('condition') || '',
      n: parseInt(params.get('n'), 10) || 0,
      domain: params.get('domain') || '',
      post: params.get('post') || '',
    };
  }

  // ---------------------------------------------------------------
  // Boot — load data, then decide setup vs direct start
  // ---------------------------------------------------------------
  const urlParams = getUrlParams();
  domainKey = urlParams.domain;
  postUrl = urlParams.post || null;

  // Determine data path: domain param → outputs/<domain>/, else root
  const basePath = domainKey ? `outputs/${domainKey}/` : '';

  Promise.all([
    fetch(basePath + 'trials.json').then(r => {
      if (!r.ok) throw new Error('trials.json not found at ' + basePath);
      return r.json();
    }),
    fetch(basePath + 'experiment_config.json').then(r => {
      if (!r.ok) throw null;
      return r.json();
    }).catch(() => null),
  ])
  .then(([trialsData, configData]) => {
    trials = trialsData;
    experimentConfig = configData;
    if (configData && configData.gram_matrix) gramMatrix = configData.gram_matrix;
    if (configData && configData.top_k_sliders) topKSliders = configData.top_k_sliders;

    // If full URL params provided, skip setup
    if (urlParams.pid && urlParams.condition) {
      participantId = urlParams.pid;
      conditionKey = urlParams.condition;
      const cmap = experimentConfig
        ? experimentConfig.conditions
        : buildFallbackConditions();
      condition = cmap[conditionKey];
      if (!condition) {
        app.innerHTML = '<div class="error-msg">Unknown condition: <strong>'
          + esc(conditionKey) + '</strong></div>';
        return;
      }
      const n = urlParams.n || (experimentConfig
        ? experimentConfig.num_trials_per_participant
        : 30) || 30;

      const rng = seedRandom(hashStr(participantId));
      assignedTrialIndices = shuffle(
        Array.from({length: trials.length}, (_, i) => i), rng
      ).slice(0, n);
      currentStep = 0;
      responses = [];
      renderInstructions();
    } else {
      renderSetup();
    }
  })
  .catch((err) => {
    let msg = 'Could not load <strong>trials.json</strong>.';
    if (domainKey) {
      msg += ' Tried path: <code>' + esc(basePath + 'trials.json') + '</code>.';
    }
    msg += '<code>cd web-interface && python3 -m http.server 8080</code>';
    app.innerHTML = '<div class="error-msg">' + msg + '</div>';
  });

  // ---------------------------------------------------------------
  // Available domains (for setup dropdown)
  // ---------------------------------------------------------------
  const KNOWN_DOMAINS = [
    { key: '', label: '(root — trials.json in web-interface/)' },
    { key: 'movies_100', label: 'Movies (100)' },
    { key: 'movies_50', label: 'Movies (50)' },
    { key: 'scruples_200', label: 'Scruples — Moral Dilemmas (200)' },
    { key: 'wines_100', label: 'Wines (100)' },
  ];

  // ---------------------------------------------------------------
  // Setup screen (internal testing only — hidden via URL params)
  // ---------------------------------------------------------------
  function renderSetup() {
    const conditions = experimentConfig
      ? experimentConfig.conditions
      : buildFallbackConditions();
    const defaultCond = experimentConfig
      ? experimentConfig.default_condition || Object.keys(conditions)[0]
      : 'choice_adjustable_sliders';
    const numTrials = experimentConfig
      ? experimentConfig.num_trials_per_participant || 30
      : Math.min(trials.length, 30);
    const domainLabel = experimentConfig
      ? (experimentConfig.domain || 'unknown')
      : 'unknown';

    let html = '<div class="setup">';
    html += '<h1>Experiment Setup</h1>';

    // Domain selector
    html += '<div class="field-group"><label>Domain</label><select id="domainSelect">';
    for (const d of KNOWN_DOMAINS) {
      const sel = d.key === domainKey ? ' selected' : '';
      html += '<option value="' + d.key + '"' + sel + '>' + esc(d.label) + '</option>';
    }
    html += '</select>';
    html += '<div class="hint">Current: ' + esc(domainLabel)
          + ' (' + trials.length + ' trials loaded)</div></div>';

    html += '<div class="field-group"><label>Participant ID</label>';
    html += '<input type="text" id="pid" placeholder="Enter your ID" value="P'
          + Math.floor(Math.random() * 9000 + 1000) + '"></div>';

    html += '<div class="field-group"><label>Condition</label><select id="condSelect">';
    for (const [key, cond] of Object.entries(conditions)) {
      const sel = key === defaultCond ? ' selected' : '';
      html += '<option value="' + key + '"' + sel + '>'
            + esc(cond.label) + '</option>';
    }
    html += '</select></div>';

    html += '<div class="field-group"><label>Number of Trials</label>';
    html += '<input type="number" id="numTrials" min="1" max="'
          + trials.length + '" value="' + numTrials + '"></div>';

    html += '<div class="submit-row"><button class="btn" id="startBtn">'
          + 'Continue</button></div>';
    html += '</div>';
    app.innerHTML = html;

    // Domain change → reload page with new domain param
    document.getElementById('domainSelect').addEventListener('change', (e) => {
      const newDomain = e.target.value;
      const url = new URL(window.location);
      if (newDomain) {
        url.searchParams.set('domain', newDomain);
      } else {
        url.searchParams.delete('domain');
      }
      window.location.href = url.toString();
    });

    document.getElementById('startBtn').addEventListener('click', () => {
      participantId = document.getElementById('pid').value.trim() || 'anon';
      conditionKey = document.getElementById('condSelect').value;
      const cmap = experimentConfig
        ? experimentConfig.conditions
        : buildFallbackConditions();
      condition = cmap[conditionKey];
      const n = parseInt(document.getElementById('numTrials').value, 10)
              || numTrials;

      const rng = seedRandom(hashStr(participantId));
      assignedTrialIndices = shuffle(
        Array.from({length: trials.length}, (_, i) => i), rng
      ).slice(0, n);
      currentStep = 0;
      responses = [];
      renderInstructions();
    });
  }

  function buildFallbackConditions() {
    return {
      choice_only: {
        label: 'Choice Only',
        show_sliders: false, sliders_adjustable: false, show_checkboxes: false,
      },
      choice_readonly_sliders: {
        label: 'Choice + Read-Only Sliders',
        show_sliders: true, sliders_adjustable: false, show_checkboxes: false,
      },
      choice_adjustable_sliders: {
        label: 'Choice + Adjustable Sliders',
        show_sliders: true, sliders_adjustable: true, show_checkboxes: false,
      },
      choice_checkboxes: {
        label: 'Choice + Relevance Checkboxes',
        show_sliders: false, sliders_adjustable: false, show_checkboxes: true,
      },
    };
  }

  // ---------------------------------------------------------------
  // Instructions screen
  // ---------------------------------------------------------------
  function renderInstructions() {
    let html = '<div class="instructions">';
    html += '<h1>Instructions</h1>';

    html += '<p>In this experiment, you will be shown pairs of options. '
          + 'For each pair, read both options and <strong>click the one you '
          + 'prefer</strong>.</p>';

    if (condition.show_sliders && !condition.sliders_adjustable) {
      html += '<div class="inst-highlight">'
            + 'After you make your choice, we will show you how our system '
            + 'scored the pair on several dimensions. You do not need to do '
            + 'anything with these scores — just review them if you like, '
            + 'then click Submit.'
            + '</div>';
    } else if (condition.show_sliders && condition.sliders_adjustable) {
      html += '<div class="inst-highlight">'
            + 'After you make your choice, we will show you how our system '
            + 'scored the pair on several dimensions. '
            + '<strong>Please adjust the sliders</strong> to better reflect '
            + 'why you made your choice. If a dimension was important to your '
            + 'decision, increase its magnitude. If it was irrelevant, '
            + 'move it toward zero. Then click Submit.'
            + '</div>';
    } else if (condition.show_checkboxes) {
      html += '<div class="inst-highlight">'
            + 'After you make your choice, we will show you several '
            + 'dimensions that may have been relevant. '
            + '<strong>Check the boxes</strong> next to the dimensions that '
            + 'actually mattered for your choice. Leave unchecked any that '
            + 'were not relevant. Then click Submit.'
            + '</div>';
    }

    html += '<p>There are ' + assignedTrialIndices.length
          + ' trials. Take your time with each one.</p>';

    html += '<div class="submit-row"><button class="btn" id="beginBtn">'
          + 'Begin</button></div>';
    html += '</div>';
    app.innerHTML = html;

    document.getElementById('beginBtn').addEventListener('click', () => {
      renderTrial();
    });
  }

  // ---------------------------------------------------------------
  // Top-K slider indices by magnitude
  // ---------------------------------------------------------------
  function getTopKIndices(sliders, chosenKey, k) {
    const vk = chosenKey === 'a' ? 'value_if_a' : 'value_if_b';
    const indexed = sliders.map((s, i) => ({i, absVal: Math.abs(s[vk])}));
    indexed.sort((a, b) => b.absVal - a.absVal);
    return indexed.slice(0, k).map(x => x.i).sort((a, b) => a - b);
  }

  // ---------------------------------------------------------------
  // Trial rendering
  // ---------------------------------------------------------------
  function renderTrial() {
    const trialIdx = assignedTrialIndices[currentStep];
    const trial = trials[trialIdx];
    chosen = null;
    visibleSliderIndices = [];
    startTime = Date.now();

    const total = assignedTrialIndices.length;
    const pct = Math.round((currentStep / total) * 100);

    let html = '';
    html += '<div class="progress">Trial ' + (currentStep + 1)
          + ' of ' + total + '</div>';
    html += '<div class="progress-bar-track"><div class="progress-bar-fill" '
          + 'style="width:' + pct + '%"></div></div>';

    if (trial.prompt) {
      html += '<div class="prompt">' + esc(trial.prompt) + '</div>';
    }

    html += '<div class="options">';
    html += buildOptionCard('a', trial.option_a);
    html += buildOptionCard('b', trial.option_b);
    html += '</div>';

    // Slider panel placeholder
    if (condition.show_sliders && trial.sliders && trial.sliders.length > 0) {
      html += '<div class="dim-panel" id="dimPanel">'
            + '<div class="dim-panel-inner">'
            + '<div class="dim-panel-header" id="dimPanelHeader"></div>'
            + '<div id="sliderContainer"></div>'
            + '</div></div>';
    }

    // Checkbox panel placeholder
    if (condition.show_checkboxes && trial.sliders && trial.sliders.length > 0) {
      html += '<div class="dim-panel" id="dimPanel">'
            + '<div class="dim-panel-inner">'
            + '<div class="dim-panel-header">'
            + 'Which of these dimensions were relevant to your choice?'
            + '</div>'
            + '<div id="checkboxContainer"></div>'
            + '</div></div>';
    }

    html += '<div class="submit-row"><button class="btn" id="submitBtn" '
          + 'disabled>Submit</button></div>';

    app.innerHTML = html;

    app.querySelectorAll('.option-card').forEach(el => {
      el.addEventListener('click', () => selectOption(el.dataset.option));
    });

    document.getElementById('submitBtn')
      .addEventListener('click', submitTrial);
  }

  function buildOptionCard(key, opt) {
    let inner = '';

    // Poster image (if available)
    if (opt.poster_url) {
      inner += '<img class="card-poster" src="' + esc(opt.poster_url)
            + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
    }

    // Title
    const title = opt.label || 'Option ' + key.toUpperCase();
    inner += '<div class="card-title">' + esc(title) + '</div>';

    // Structured fields — skip hidden/internal ones
    if (opt.fields) {
      for (const [fk, fv] of Object.entries(opt.fields)) {
        if (HIDDEN_FIELDS.has(fk) || !fv) continue;
        // Skip if same as title
        if (String(fv).trim() === title.trim()) continue;
        const label = FIELD_LABELS[fk]
          || fk.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        inner += '<div class="card-field"><strong>' + esc(label)
              + ':</strong> ' + esc(fv) + '</div>';
      }
    }

    // Fallback plain text
    if (opt.text) {
      inner += '<div class="card-text">' + esc(opt.text) + '</div>';
    }

    return '<div class="option-card" data-option="' + key + '">'
         + inner + '</div>';
  }

  // ---------------------------------------------------------------
  // Selection
  // ---------------------------------------------------------------
  function selectOption(key) {
    chosen = key;
    const trialIdx = assignedTrialIndices[currentStep];
    const trial = trials[trialIdx];

    app.querySelectorAll('.option-card').forEach(el => {
      el.classList.toggle('selected', el.dataset.option === key);
      el.classList.toggle('dimmed', el.dataset.option !== key);
    });

    visibleSliderIndices = getTopKIndices(trial.sliders, key, topKSliders);

    if (condition.show_sliders) populateSliders(trial, key);
    if (condition.show_checkboxes) populateCheckboxes(trial, key);

    const panel = document.getElementById('dimPanel');
    if (panel) panel.classList.add('visible');

    document.getElementById('submitBtn').disabled = false;
  }

  // ---------------------------------------------------------------
  // Sliders (with co-movement)
  // ---------------------------------------------------------------
  function populateSliders(trial, key) {
    const container = document.getElementById('sliderContainer');
    const header = document.getElementById('dimPanelHeader');
    if (!container || !header) return;

    header.textContent = condition.sliders_adjustable
      ? 'Adjust these scores to reflect why you made this choice:'
      : 'How the system scored this pair on each dimension:';

    let html = '';
    for (const si of visibleSliderIndices) {
      const s = trial.sliders[si];
      const val = key === 'a' ? s.value_if_a : s.value_if_b;
      const dis = condition.sliders_adjustable ? '' : ' disabled';
      html += '<div class="slider-row">';
      html += '<div class="slider-label">' + esc(s.label);
      if (s.low_label && s.high_label) {
        html += '<span class="pole-labels">'
              + esc(s.low_label) + ' \u2192 ' + esc(s.high_label)
              + '</span>';
      }
      html += '</div>';
      html += '<div class="slider-track">'
            + '<input type="range" min="-100" max="100" step="1" '
            + 'value="' + val + '" data-id="' + s.id
            + '" data-slider-index="' + si + '"' + dis + '></div>';
      html += '<span class="slider-value" data-for="'
            + s.id + '">' + val + '</span>';
      html += '</div>';
    }
    container.innerHTML = html;

    if (condition.sliders_adjustable && gramMatrix) {
      container.querySelectorAll('input[type="range"]').forEach(input => {
        input.addEventListener('input', e => handleSliderChange(e, trial, key));
      });
    } else {
      container.querySelectorAll('input[type="range"]').forEach(input => {
        input.addEventListener('input', () => {
          const disp = app.querySelector(
            '.slider-value[data-for="' + input.dataset.id + '"]');
          if (disp) disp.textContent = input.value;
        });
      });
    }
  }

  function handleSliderChange(e, trial, key) {
    const ci = e.target;
    const changedIdx = parseInt(ci.dataset.sliderIndex, 10);
    const newVal = parseInt(ci.value, 10);
    const origVal = key === 'a'
      ? trial.sliders[changedIdx].value_if_a
      : trial.sliders[changedIdx].value_if_b;

    // Update display for changed slider
    const disp = app.querySelector(
      '.slider-value[data-for="' + ci.dataset.id + '"]');
    if (disp) disp.textContent = newVal;

    if (!gramMatrix) return;
    const delta = newVal - origVal;
    if (Math.abs(delta) < 1) return;

    const container = document.getElementById('sliderContainer');
    container.querySelectorAll('input[type="range"]').forEach(other => {
      const otherIdx = parseInt(other.dataset.sliderIndex, 10);
      if (otherIdx === changedIdx) return;

      const corr = gramMatrix[otherIdx][changedIdx];
      if (Math.abs(corr) < 0.05) return;

      const otherOrig = key === 'a'
        ? trial.sliders[otherIdx].value_if_a
        : trial.sliders[otherIdx].value_if_b;

      const coMoveDelta = Math.round(corr * delta);
      const newOther = Math.max(-100, Math.min(100, otherOrig + coMoveDelta));

      other.value = newOther;
      const od = app.querySelector(
        '.slider-value[data-for="' + other.dataset.id + '"]');
      if (od) od.textContent = newOther;
    });
  }

  // ---------------------------------------------------------------
  // Checkboxes
  // ---------------------------------------------------------------
  function populateCheckboxes(trial, key) {
    const container = document.getElementById('checkboxContainer');
    if (!container) return;

    let html = '';
    for (const si of visibleSliderIndices) {
      const s = trial.sliders[si];
      const val = key === 'a' ? s.value_if_a : s.value_if_b;
      const absVal = Math.abs(val);
      const barClass = val >= 0 ? 'positive' : 'negative';

      html += '<div class="checkbox-row">';
      html += '<input type="checkbox" id="cb_' + s.id
            + '" data-id="' + s.id
            + '" data-slider-index="' + si + '">';
      html += '<label class="cb-label" for="cb_' + s.id + '">'
            + esc(s.label) + '</label>';
      html += '<div class="cb-bar-container"><div class="cb-bar '
            + barClass + '" style="width:' + absVal + '%"></div></div>';
      html += '<span class="cb-value">' + val + '</span>';
      html += '</div>';
    }
    container.innerHTML = html;
  }

  // ---------------------------------------------------------------
  // Submit
  // ---------------------------------------------------------------
  function submitTrial() {
    const trialIdx = assignedTrialIndices[currentStep];
    const trial = trials[trialIdx];
    const elapsed = Date.now() - startTime;

    const response = {
      trial_id: trial.trial_id,
      option_a_id: trial.option_a_id || null,
      option_b_id: trial.option_b_id || null,
      chosen: chosen,
      response_time_ms: elapsed,
      visible_dimensions: visibleSliderIndices.map(i => trial.sliders[i].id),
    };

    if (condition.show_sliders && trial.sliders) {
      const sv = {};
      for (const si of visibleSliderIndices) {
        const s = trial.sliders[si];
        const inp = app.querySelector('input[data-id="' + s.id + '"]');
        sv[s.id] = inp ? parseInt(inp.value, 10) : 0;
      }
      response.slider_values = sv;
      response.sliders_adjusted = condition.sliders_adjustable;
    }

    if (condition.show_checkboxes && trial.sliders) {
      const cv = {};
      for (const si of visibleSliderIndices) {
        const s = trial.sliders[si];
        const cb = document.getElementById('cb_' + s.id);
        cv[s.id] = cb ? (cb.checked ? 1 : 0) : 0;
      }
      response.checkbox_values = cv;
    }

    responses.push(response);
    currentStep++;

    if (currentStep < assignedTrialIndices.length) {
      renderTrial();
      window.scrollTo({top: 0, behavior: 'smooth'});
    } else {
      finishExperiment();
    }
  }

  // ---------------------------------------------------------------
  // Finish — POST if endpoint configured, then show results
  // ---------------------------------------------------------------
  function finishExperiment() {
    const output = {
      participant_id: participantId,
      condition: conditionKey,
      domain: domainKey || (experimentConfig ? experimentConfig.domain : ''),
      num_trials: responses.length,
      timestamp: new Date().toISOString(),
      responses: responses,
    };

    // POST to endpoint if configured
    if (postUrl) {
      fetch(postUrl, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(output),
      }).catch(() => {}); // fire-and-forget
    }

    renderResults(output);
  }

  // ---------------------------------------------------------------
  // Results
  // ---------------------------------------------------------------
  function renderResults(output) {
    const outputStr = JSON.stringify(output, null, 2);
    const avgTime = Math.round(
      responses.reduce((s, r) => s + (r.response_time_ms || 0), 0)
      / responses.length / 1000 * 10
    ) / 10;

    let html = '<div class="results">';
    html += '<h1>Thank You!</h1>';
    html += '<div class="stats">You completed ' + responses.length
          + ' trials \u00b7 avg ' + avgTime + 's per trial</div>';
    html += '<pre><code>' + esc(outputStr) + '</code></pre>';
    html += '<div class="copy-row">';
    html += '<button class="btn" id="copyBtn">Copy to Clipboard</button> ';
    html += '<button class="btn-secondary" id="downloadBtn">'
          + 'Download JSON</button>';
    html += '</div></div>';
    app.innerHTML = html;

    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(outputStr).then(() => {
        const b = document.getElementById('copyBtn');
        b.textContent = 'Copied!';
        setTimeout(() => { b.textContent = 'Copy to Clipboard'; }, 1500);
      });
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const blob = new Blob([outputStr], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'responses_' + participantId + '_' + conditionKey + '.json';
      a.click();
      URL.revokeObjectURL(url);
    });
  }

  // ---------------------------------------------------------------
  // Utilities
  // ---------------------------------------------------------------
  function esc(str) {
    if (str == null) return '';
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) {
      h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    }
    return Math.abs(h);
  }

  function seedRandom(seed) {
    let s = seed | 0;
    return function () {
      s = (s + 0x6D2B79F5) | 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function shuffle(arr, rng) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
})();
</script>
