# Pipeline config: scruples_dilemmas
# Run with: ./run_pipeline.sh configs/scruples_dilemmas.yaml
#
# Prerequisites:
#   python datasets/prepare_scruples_v2.py
#
# Data structure:
#   - datasets/scruples-dilemmas-actions.csv    — individual actions (for embed/score)
#   - datasets/scruples-dilemmas-pairs.csv      — original dilemma pairs (for dim discovery + trials)

name: scruples_dilemmas
domain: moral dilemmas
domain_item: action
choice_context: Consider these two actions from the same real-life situation. Which action is more ethically questionable?

# Input data — individual actions for embedding and scoring
input_csv: datasets/scruples-dilemmas-actions.csv
template_file: datasets/scruples_prompt.txt
id_column: action_id
text_column: description
display_column: description

# Pair data — original dilemma pairs for dimension discovery and trials
pairs_csv: datasets/scruples-dilemmas-pairs.csv

# Selection — number of dilemma pairs to select (actions = 2x this)
num_options: 300

# Dimension discovery
num_dimensions: 20
num_pairs: 150
num_themes: 50
reasons_per_side: 5
pair_appearances_per_option: 30

# Experiment
num_experiment_pairs: 200
trials_per_participant: 30

# Infrastructure
max_workers: 32
seed: 42
embedding_model: Qwen/Qwen3-Embedding-8B
instruct_model: Qwen/Qwen3-32B
